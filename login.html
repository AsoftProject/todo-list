<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./Style/_global.css">
    <link rel="stylesheet" href="./Style/login.css">
    <title>TodoList | Login</title>
</head>

<body>
    <div class="login-wrapper"> 
        <section class="login-container card-center">
                <h1>Bem-vindo de volta</h1>
                <!-- Formulário -->
                <form action="#" method="#">

                    <!-- input email -->
                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" name="email" id="email" placeholder="exemplo@gmail.com">
                    </div>

                    <!-- input password -->
                    <div class="input-group input-group-password">
                        <label for="password">Password</label>
                        <input type="password" name="password" id="password" placeholder="********">
                    </div>
                    <!-- button -->
                    <button class="btn-blue">Login</button>
                </form>
                <a href="#">Criar conta</a>
            </section>
    </div>
</body>

</html>
