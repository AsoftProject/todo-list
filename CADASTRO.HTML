<!DOCTYPE html>
<html lang="PT-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> tela de cadastro</title>
<style>
    *{
        margin: 0;
        text-decoration: none;
        padding: 0;
    }

    body{
        background-color: #ccc;
        margin-top: 100px;
    }

    div{
        box-shadow: 0 0 6px black;
        padding-top: 20px;
        margin: 0 auto;
        border-radius: 10px;
        max-width: 400px;
        height: 400px;
        background-color: #fff;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    div h1{
        text-align: center;
        font-weight: bolder;
        font-size: 40px;
    }

    div form{
        padding: 20px;
    }

    div input{
        border-radius: 20px;
        border: 1px solid black;
        display: block;
        width: 90%;
        padding: 10px;
        margin: 0 auto;
    }

    .button{
        background-color: blue;
        color: white;
    }

   p{
    text-align: center;
    color: blue;
   }
</style>
</head>

<body>

    <div>
        <h1>Cadastro</h1>
      <form action="">
        <label for="nome">Nome</label>
        <input type="text" name="nome" id="nome" placeholder="Digite o seu nome" required>
        <label for="email">Email</label>
        <input type="email" name="email" id="email" placeholder="Digite o seu email" required>
        <label for="senha">Senha</label>
        <input type="password" name="senha" id="senha" placeholder="Digite a sua senha" required><br>
        <input class="button" type="button" value="Cadastrar">
      </form>
      <p>Já tem uma conta?<a href="login.html">Login</a></p>
    </div>
</body>

</html>
